    <div id="root">
                  <style>
              .initial-loader {
                  position: fixed;
                  top: 0;
                  left: 0;
                  width: 100vw;
                  height: 100vh;
                  display: flex;
                  flex-direction: column;
                  background-color: #2B2D31;
                  z-index: 9999;
                  font-family: 'Syne', sans-serif;
              }
              .skeleton-dock {
                  position: fixed;
                  top: 20px;
                  left: 50%;
                  transform: translateX(-50%);
                  width: 400px;
                  height: 60px;
                  border-radius: 40px;
                  box-sizing: border-box;
              }
              .skeleton-content {
                  flex: 1;
                  padding: 100px 2rem 3rem 2rem;
                  display: flex;
                  flex-direction: column;
                  gap: 2rem;
                  box-sizing: border-box;
                  max-width: 800px;
                  margin: 0 auto;
                  width: 100%;
              }
              .skeleton-pulse {
                  background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
                  background-size: 200% 100%;
                  animation: pulse 1.5s infinite linear;
                  border-radius: 8px;
              }
              @keyframes pulse {
                  0% { background-position: 200% 0; }
                  100% { background-position: -200% 0; }
              }
              .skeleton-title { height: 40px; width: 40%; margin: 0 auto 1rem auto; }
              .skeleton-card { height: 150px; width: 100%; border-radius: 12px; }
  
              [data-theme="light"] .initial-loader {
                  background-color: #F8FAFC;
              }
              [data-theme="light"] .skeleton-pulse {
                  background: linear-gradient(90deg, rgba(0, 0, 0, 0.05) 25%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.05) 75%);
                  background-size: 200% 100%;
              }
  
              @media (max-width: 768px) {
                  .skeleton-dock {
                      top: auto;
                      bottom: 10px;
                      width: 90vw;
                      height: 50px;
                  }
                  .skeleton-content { padding: 80px 1rem 100px 1rem; gap: 1.5rem; }
              }
          </style>
          <div class="initial-loader">
              <div class="skeleton-dock skeleton-pulse"></div>
              <div class="skeleton-content">
                  <div class="skeleton-title skeleton-pulse"></div>
                  <div class="skeleton-card skeleton-pulse"></div>
                  <div class="skeleton-card skeleton-pulse"></div>
                  <div class="skeleton-card skeleton-pulse"></div>
              </div>
          </div>
